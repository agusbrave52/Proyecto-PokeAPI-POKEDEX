<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto PokeAPI</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <button id="darkModeToggle">Dark Mode</button>
    <div class="busqueda">
        <label for="searchInput">Buscar por nombre: </label>
        <input type="text" id="searchInput" placeholder="Pikachu...">
    </div>
    <div class="filtro">
        <label for="typeFilter">Filtrar por tipo: </label>
        <select id="typeFilter">
            <option value="all">Todos</option>
            <option value="normal">Normal</option>
            <option value="fire">Fuego</option>
            <option value="water">Agua</option>
            <option value="electric">Eléctrico</option>
            <option value="grass">Planta</option>
            <option value="ice">Hielo</option>
            <option value="fighting">Lucha</option>
            <option value="poison">Veneno</option>
            <option value="ground">Tierra</option>
            <option value="flying">Volador</option>
            <option value="psychic">Psíquico</option>
            <option value="bug">Bicho</option>
            <option value="rock">Roca</option>
            <option value="ghost">Fantasma</option>
            <option value="dragon">Dragón</option>
            <option value="dark">Siniestro</option>
            <option value="steel">Acero</option>
            <option value="fairy">Hada</option>
        </select>
    </div>
    <div class="filtroFeatures">
        <label>Filtrar por características físicas (IA): </label>
        <div class="multiselect-wrapper" id="featureFilter">
            <button type="button" class="multiselect-btn" id="featureToggle">Todas ▼</button>
            <div class="multiselect-dropdown hidden" id="featureDropdown">
                <input type="text" class="multiselect-search" placeholder="Buscar característica...">
                <div class="multiselect-list" id="featureList"></div>
                <button type="button" class="multiselect-clear" id="featureClear">Limpiar selección</button>
            </div>
        </div>
    </div>
    <div class="filtroAesthetic">
        <label for="aestheticFilter">Filtrar por estética (IA): </label>
        <select id="aestheticFilter">
            <option value="all">Todas</option>
        </select>
    </div>
    <div class="filtroGenerations">
        <label for="generationFilter">Filtrar por generación: </label>
        <select id="generationFilter">
            <option value="all">Todas</option>
        </select>
    </div>
    <div class="filtroForma">
        <label for="shapeFilter">Filtrar por forma: </label>
        <select id="shapeFilter">
            <option value="all">Todas</option>
        </select>
    </div>
    <div class="filtroStage">
        <label for="evolutionStageFilter">Filtrar por etapa evolutiva: </label>
        <select id="evolutionStageFilter">
            <option value="all">Todas</option>
            <option value="1">Etapa 1</option>
            <option value="2">Etapa 2</option>
            <option value="3">Etapa 3</option>
        </select>
    </div>
    <div class="filtroLegendary">
        <label for="legendaryFilter">Mostrar solo legendarios: </label>
        <input type="checkbox" id="legendaryFilter">
    </div>


    <div class="contenedor">

    </div>
    <div id="pagination"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/poke.js"></script>
</body>

</html>
